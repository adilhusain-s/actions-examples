name: quick workflow

on: [workflow_dispatch, pull_request]

jobs:
  quick-job:
    name: print platform arch
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04-ppc64le-vm, ubuntu-22.04]
    steps:
      - name: Run commands
        run: |
          time uname -a
          time arch
