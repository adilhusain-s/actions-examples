name: Kubernetes CI Runner Conformance

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  KIND_VERSION: v0.32.0
  K8S_VERSION: v1.33.12
  HELM_VERSION: v3.17.3
  KIND_NODE_IMAGE_AMD64: kindest/node:v1.33.12@sha256:3f5c8443c620245e4d355cfe09e96a91ead32ceaa569d3f1ca9edf0cb2fe2ff4
  KIND_CLUSTER_PREFIX: runner-conformance
  TEST_IMAGE_PREFIX: runner-conformance-app

jobs:
  runner-conformance:
    name: Conformance - ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            expected_arch: amd64
          - runner: ubuntu-24.04-ppc64le-vm
            expected_arch: ppc64le

    timeout-minutes: 90

    steps:
      - name: "[Setup] Create Unique Test Environment"
        id: unique
        shell: bash
        run: |
          set -euo pipefail

          RAW_ARCH="$(uname -m)"

          case "$RAW_ARCH" in
            x86_64)
              ARCH="amd64"
              ;;
            aarch64|arm64)
              ARCH="arm64"
              ;;
            ppc64le)
              ARCH="ppc64le"
              ;;
            s390x)
              ARCH="s390x"
              ;;
            *)
              ARCH="$RAW_ARCH"
              ;;
          esac

          TEST_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ strategy.job-index }}-${ARCH}"
          CLUSTER_NAME="${KIND_CLUSTER_PREFIX}-${TEST_ID}"
          TEST_IMAGE="${TEST_IMAGE_PREFIX}:${TEST_ID}"
          TEST_NAMESPACE="runner-conformance-${TEST_ID}"
          WORK_DIR="$(mktemp -d -t runner-conformance.XXXXXXXX)"
          LOG_DIR="$WORK_DIR/logs"
          KUBECONFIG_FILE="$WORK_DIR/kubeconfig"
          mkdir -p "$LOG_DIR"
          chmod 700 "$WORK_DIR" "$LOG_DIR"

          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
          echo "raw_arch=$RAW_ARCH" >> "$GITHUB_OUTPUT"
          echo "test_id=$TEST_ID" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "test_image=$TEST_IMAGE" >> "$GITHUB_OUTPUT"
          echo "test_namespace=$TEST_NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "work_dir=$WORK_DIR" >> "$GITHUB_OUTPUT"
          echo "log_dir=$LOG_DIR" >> "$GITHUB_OUTPUT"
          echo "kubeconfig=$KUBECONFIG_FILE" >> "$GITHUB_OUTPUT"

          echo "CONFORMANCE_ARCH=$ARCH" >> "$GITHUB_ENV"
          echo "TEST_ID=$TEST_ID" >> "$GITHUB_ENV"
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> "$GITHUB_ENV"
          echo "TEST_IMAGE=$TEST_IMAGE" >> "$GITHUB_ENV"
          echo "TEST_NAMESPACE=$TEST_NAMESPACE" >> "$GITHUB_ENV"
          echo "WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"
          echo "LOG_DIR=$LOG_DIR" >> "$GITHUB_ENV"
          echo "KUBECONFIG=$KUBECONFIG_FILE" >> "$GITHUB_ENV"

          echo "STRATEGY=not-evaluated" >> "$GITHUB_ENV"
          echo "ATTEMPT_CLUSTER=false" >> "$GITHUB_ENV"
          echo "CLUSTER_CREATED=false" >> "$GITHUB_ENV"
          echo "KUBE_SUITE_ENABLED=false" >> "$GITHUB_ENV"
          echo "K8S_SUITE_PASSED=false" >> "$GITHUB_ENV"
          echo "HELM_CLI_AVAILABLE=false" >> "$GITHUB_ENV"
          echo "KIND_NODE_IMAGE_USED=none" >> "$GITHUB_ENV"
          echo "CLASSIFICATION=RUNNER_CONFIGURATION_FAILURE" >> "$GITHUB_ENV"
          echo "CLASSIFICATION_REASON=A required host/container prerequisite failed." >> "$GITHUB_ENV"
          echo "UPSTREAM_BLOCKER=none" >> "$GITHUB_ENV"

          echo "Test ID:       $TEST_ID"
          echo "Runner arch:   $ARCH"
          echo "Cluster name:  $CLUSTER_NAME"
          echo "Test image:    $TEST_IMAGE"
          echo "Namespace:     $TEST_NAMESPACE"
          echo "Work dir:      $WORK_DIR"

      - name: "[Setup] Verify Matrix Architecture"
        shell: bash
        run: |
          set -euo pipefail

          if [ "${CONFORMANCE_ARCH}" != "${{ matrix.expected_arch }}" ]; then
            echo "::error::Matrix expected architecture ${{ matrix.expected_arch }} but detected ${CONFORMANCE_ARCH}."
            exit 1
          fi

      - name: "[Host] System Information"
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Identity ==="
          id

          echo ""
          echo "=== Hostname ==="
          hostname

          echo ""
          echo "=== Kernel ==="
          uname -a

          echo ""
          echo "=== Architecture ==="
          uname -m

          echo ""
          echo "=== OS ==="
          cat /etc/os-release || true

          echo ""
          echo "=== CPU ==="
          nproc
          lscpu || true

          echo ""
          echo "=== Memory ==="
          free -h || true

          echo ""
          echo "=== Disk ==="
          df -h

          echo ""
          echo "=== Cgroups ==="
          mount | grep cgroup || true

          if [ -f /sys/fs/cgroup/cgroup.controllers ]; then
            echo "cgroup v2 detected"
            cat /sys/fs/cgroup/cgroup.controllers
          else
            echo "cgroup v1 or hybrid detected"
          fi

      - name: "[Host] Filesystem Test"
        shell: bash
        run: |
          set -euo pipefail

          TEST_DIR="$WORK_DIR/filesystem"
          mkdir -p "$TEST_DIR"

          echo "hello" > "$TEST_DIR/file"
          test "$(cat "$TEST_DIR/file")" = "hello"

          ln -s "$TEST_DIR/file" "$TEST_DIR/symlink"
          test -L "$TEST_DIR/symlink"

          chmod 600 "$TEST_DIR/file"
          cp "$TEST_DIR/file" "$TEST_DIR/copy"
          mv "$TEST_DIR/copy" "$TEST_DIR/moved"

          rm -rf "$TEST_DIR"
          echo "Filesystem test: PASS"

      - name: "[Host] Network and DNS Test"
        shell: bash
        run: |
          set -euo pipefail

          echo "=== DNS ==="
          getent hosts github.com
          getent hosts registry-1.docker.io || true
          getent hosts dl.k8s.io
          getent hosts get.helm.sh

          echo ""
          echo "=== HTTPS ==="

          curl --fail --silent --show-error --location --retry 3 --connect-timeout 20 --output /dev/null https://github.com
          curl --fail --silent --show-error --location --retry 3 --connect-timeout 20 --output /dev/null https://dl.k8s.io
          curl --fail --silent --show-error --location --retry 3 --connect-timeout 20 --output /dev/null https://get.helm.sh

          echo "Network test: PASS"

      - name: "[Container] Validate Docker"
        shell: bash
        run: |
          set -euo pipefail

          command -v docker
          docker version
          docker info

      - name: "[Container] Pull and Run Container"
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm busybox:latest sh -c 'echo "container architecture: $(uname -m)"; echo "container execution: PASS"'

      - name: "[Container] Docker Network Test"
        shell: bash
        run: |
          set -euo pipefail

          NETWORK="conformance-net-$TEST_ID"

          cleanup() {
            docker network rm "$NETWORK" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker network create "$NETWORK"
          docker network inspect "$NETWORK" >/dev/null

      - name: "[Container] Docker Volume Test"
        shell: bash
        run: |
          set -euo pipefail

          VOLUME="conformance-volume-$TEST_ID"

          cleanup() {
            docker volume rm "$VOLUME" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker volume create "$VOLUME"

          docker run --rm -v "$VOLUME:/data" busybox:latest sh -c 'echo conformance > /data/test'

          RESULT="$(docker run --rm -v "$VOLUME:/data" busybox:latest cat /data/test)"
          test "$RESULT" = "conformance"

      - name: "[Container] Privileged Container Test"
        id: privileged
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm --privileged busybox:latest sh -c 'test -d /sys; test -d /proc; echo "privileged container: PASS"'

      - name: "[Container] Build Local Test Image"
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="$WORK_DIR/app"
          mkdir -p "$APP_DIR"

          cat > "$APP_DIR/Dockerfile" <<'EOF'
          FROM busybox:latest
          RUN mkdir -p /www
          RUN printf '%s\n' '<html>' '<body>' 'runner-conformance-ok' '</body>' '</html>' > /www/index.html
          EXPOSE 8080
          CMD ["httpd", "-f", "-p", "8080", "-h", "/www"]
          EOF

          docker build --tag "$TEST_IMAGE" "$APP_DIR"
          docker image inspect "$TEST_IMAGE" >/dev/null

      - name: "[Tools] Install kubectl"
        shell: bash
        run: |
          set -euo pipefail

          ARCH="$(echo "${CONFORMANCE_ARCH}" | tr '[:upper:]' '[:lower:]')"
          URL="https://dl.k8s.io/release/${K8S_VERSION}/bin/linux/${ARCH}/kubectl"
          SUM_URL="https://dl.k8s.io/release/${K8S_VERSION}/bin/linux/${ARCH}/kubectl.sha256"

          echo "Downloading: $URL"
          curl --fail --show-error --location --retry 5 --retry-delay 3 --output "$WORK_DIR/kubectl" "$URL"
          curl --fail --show-error --location --retry 5 --retry-delay 3 --output "$WORK_DIR/kubectl.sha256" "$SUM_URL"

          EXPECTED="$(tr -d '\n' < "$WORK_DIR/kubectl.sha256")"
          ACTUAL="$(sha256sum "$WORK_DIR/kubectl" | awk '{print $1}')"
          test "$EXPECTED" = "$ACTUAL"

          chmod +x "$WORK_DIR/kubectl"
          mkdir -p "$HOME/.local/bin"
          cp "$WORK_DIR/kubectl" "$HOME/.local/bin/kubectl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          kubectl version --client

      - name: "[Tools] Install Helm (independent of kind)"
        id: helm_install
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.local/bin"
          ARCH="$(echo "${CONFORMANCE_ARCH}" | tr '[:upper:]' '[:lower:]')"
          HELM_TGZ="helm-${HELM_VERSION}-linux-${ARCH}.tar.gz"
          HELM_URL="https://get.helm.sh/${HELM_TGZ}"
          HELM_SUM_URL="${HELM_URL}.sha256sum"

          if curl --fail --silent --show-error --location --head "$HELM_URL" >/dev/null; then
            curl --fail --show-error --location --retry 5 --retry-delay 3 --output "$WORK_DIR/$HELM_TGZ" "$HELM_URL"
            curl --fail --show-error --location --retry 5 --retry-delay 3 --output "$WORK_DIR/$HELM_TGZ.sha256sum" "$HELM_SUM_URL"

            EXPECTED="$(awk '{print $1}' "$WORK_DIR/$HELM_TGZ.sha256sum")"
            ACTUAL="$(sha256sum "$WORK_DIR/$HELM_TGZ" | awk '{print $1}')"
            test "$EXPECTED" = "$ACTUAL"

            tar -xzf "$WORK_DIR/$HELM_TGZ" -C "$WORK_DIR"
            cp "$WORK_DIR/linux-${ARCH}/helm" "$HOME/.local/bin/helm"
            chmod +x "$HOME/.local/bin/helm"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            helm version --short

            echo "HELM_CLI_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "helm_cli_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::No official Helm artifact found for linux/${ARCH} at ${HELM_URL}."

          if command -v go >/dev/null 2>&1; then
            GOBIN="$HOME/.local/bin" go install helm.sh/helm/v3/cmd/helm@${HELM_VERSION}
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            helm version --short

            echo "HELM_CLI_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "helm_cli_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Helm CLI unavailable: no official binary and Go not found for source build fallback."
          echo "HELM_CLI_AVAILABLE=false" >> "$GITHUB_ENV"
          echo "helm_cli_available=false" >> "$GITHUB_OUTPUT"

      - name: "[Cluster] Select Strategy"
        id: strategy
        shell: bash
        run: |
          set -euo pipefail

          if [ "$CONFORMANCE_ARCH" = "amd64" ]; then
            echo "strategy=kind-standard" >> "$GITHUB_OUTPUT"
            echo "attempt_cluster=true" >> "$GITHUB_OUTPUT"
            echo "STRATEGY=kind-standard" >> "$GITHUB_ENV"
            echo "ATTEMPT_CLUSTER=true" >> "$GITHUB_ENV"
            echo "KIND_NODE_IMAGE_USED=${KIND_NODE_IMAGE_AMD64}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "$CONFORMANCE_ARCH" = "ppc64le" ]; then
            echo "strategy=kind-custom-native-build" >> "$GITHUB_OUTPUT"
            echo "attempt_cluster=true" >> "$GITHUB_OUTPUT"
            echo "STRATEGY=kind-custom-native-build" >> "$GITHUB_ENV"
            echo "ATTEMPT_CLUSTER=true" >> "$GITHUB_ENV"
            exit 0
          fi

          BLOCKER="No validated kind strategy for architecture ${CONFORMANCE_ARCH}."
          echo "strategy=unsupported-architecture" >> "$GITHUB_OUTPUT"
          echo "attempt_cluster=false" >> "$GITHUB_OUTPUT"
          echo "STRATEGY=unsupported-architecture" >> "$GITHUB_ENV"
          echo "ATTEMPT_CLUSTER=false" >> "$GITHUB_ENV"
          echo "CLASSIFICATION=PARTIAL_CONFORMANCE_UPSTREAM_LIMITATION" >> "$GITHUB_ENV"
          echo "CLASSIFICATION_REASON=$BLOCKER" >> "$GITHUB_ENV"
          echo "UPSTREAM_BLOCKER=$BLOCKER" >> "$GITHUB_ENV"

      - name: "[Cluster] Install kind"
        if: steps.strategy.outputs.attempt_cluster == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.local/bin"

          if [ "$CONFORMANCE_ARCH" = "amd64" ] || [ "$CONFORMANCE_ARCH" = "arm64" ]; then
            KIND_URL="https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-${CONFORMANCE_ARCH}"
            if curl --fail --silent --show-error --location --head "$KIND_URL" >/dev/null; then
              curl --fail --show-error --location --retry 5 --retry-delay 3 --output "$WORK_DIR/kind" "$KIND_URL"
              chmod +x "$WORK_DIR/kind"
              cp "$WORK_DIR/kind" "$HOME/.local/bin/kind"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              kind version
              exit 0
            fi
          fi

          if ! command -v go >/dev/null 2>&1; then
            echo "::error::Go is required to build/install kind for architecture ${CONFORMANCE_ARCH}."
            exit 1
          fi

          GOBIN="$HOME/.local/bin" go install sigs.k8s.io/kind@${KIND_VERSION}
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          kind version

      - name: "[Cluster] Build Node Image and Create Cluster"
        id: cluster_create
        if: steps.strategy.outputs.attempt_cluster == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          KIND_CONFIG="$WORK_DIR/kind-config.yaml"

          cat > "$KIND_CONFIG" <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
          EOF

          if [ "${STRATEGY}" = "kind-standard" ]; then
            kind create cluster \
              --name "$CLUSTER_NAME" \
              --image "${KIND_NODE_IMAGE_AMD64}" \
              --config "$KIND_CONFIG" \
              --kubeconfig "$KUBECONFIG" \
              --wait 300s \
              --retain \
              2>&1 | tee "$LOG_DIR/kind-create.log"

            echo "CLUSTER_CREATED=true" >> "$GITHUB_ENV"
            echo "KUBE_SUITE_ENABLED=true" >> "$GITHUB_ENV"
            echo "KIND_NODE_IMAGE_USED=${KIND_NODE_IMAGE_AMD64}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "${STRATEGY}" != "kind-custom-native-build" ]; then
            echo "::error::Unsupported strategy ${STRATEGY}"
            exit 1
          fi

          KIND_SRC="$WORK_DIR/kind-src"
          BASE_TAG="${KIND_VERSION}-ppc64le-${TEST_ID}"
          BASE_IMAGE="kindest/base:${BASE_TAG}"
          CUSTOM_NODE_IMAGE="kindest/node:${K8S_VERSION}-ppc64le-${TEST_ID}"

          echo "Using kind source tag ${KIND_VERSION}" | tee "$LOG_DIR/kind-source.log"
          git clone --depth 1 --branch "${KIND_VERSION}" https://github.com/kubernetes-sigs/kind.git "$KIND_SRC" 2>&1 | tee -a "$LOG_DIR/kind-source.log"

          pushd "$KIND_SRC" >/dev/null

          TAG="${BASE_TAG}" make -C images/base quick 2>&1 | tee "$LOG_DIR/kind-base-build.log"

          kind build node-image \
            --arch ppc64le \
            --base-image "$BASE_IMAGE" \
            --image "$CUSTOM_NODE_IMAGE" \
            --type release \
            "${K8S_VERSION}" \
            2>&1 | tee "$LOG_DIR/kind-node-build.log"

          popd >/dev/null

          kind create cluster \
            --name "$CLUSTER_NAME" \
            --image "$CUSTOM_NODE_IMAGE" \
            --config "$KIND_CONFIG" \
            --kubeconfig "$KUBECONFIG" \
            --wait 420s \
            --retain \
            2>&1 | tee "$LOG_DIR/kind-create.log"

          echo "CLUSTER_CREATED=true" >> "$GITHUB_ENV"
          echo "KUBE_SUITE_ENABLED=true" >> "$GITHUB_ENV"
          echo "KIND_NODE_IMAGE_USED=$CUSTOM_NODE_IMAGE" >> "$GITHUB_ENV"

      - name: "[Cluster] Classify Build/Create Result"
        if: always() && steps.strategy.outputs.attempt_cluster == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.cluster_create.outcome }}" = "success" ] && [ "${CLUSTER_CREATED}" = "true" ]; then
            exit 0
          fi

          if [ "$CONFORMANCE_ARCH" = "ppc64le" ]; then
            if grep -Eiq "unsupported architecture|nominally support|no matching manifest for linux/ppc64le|manifest unknown|404 Not Found|kubernetes-server-linux-ppc64le.*(404|not found)" "$LOG_DIR"/*.log 2>/dev/null; then
              BLOCKER="Upstream kind/kindest architecture dependency prevented native ppc64le cluster bootstrap."
              echo "CLASSIFICATION=PARTIAL_CONFORMANCE_UPSTREAM_LIMITATION" >> "$GITHUB_ENV"
              echo "CLASSIFICATION_REASON=$BLOCKER" >> "$GITHUB_ENV"
              echo "UPSTREAM_BLOCKER=$BLOCKER" >> "$GITHUB_ENV"
              exit 0
            fi
          fi

          REASON="Cluster build/create failed after host and container tests passed; root cause not yet proven to be an upstream architecture limitation."
          echo "CLASSIFICATION=KUBERNETES_BOOTSTRAP_FAILURE" >> "$GITHUB_ENV"
          echo "CLASSIFICATION_REASON=$REASON" >> "$GITHUB_ENV"

      - name: "[Cluster] Validate Cluster Health"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl cluster-info
          kubectl get nodes -o wide

          kubectl wait --for=condition=Ready node --all --timeout=180s

          kubectl get pods --all-namespaces -o wide
          kubectl get nodes -o custom-columns='NAME:.metadata.name,ARCH:.status.nodeInfo.architecture,OS:.status.nodeInfo.operatingSystem,RUNTIME:.status.nodeInfo.containerRuntimeVersion'

      - name: "[Cluster] Load Local Image"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kind load docker-image "$TEST_IMAGE" --name "$CLUSTER_NAME"

      - name: "[Kubernetes] Create Namespace"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl create namespace "$TEST_NAMESPACE"
          kubectl get namespace "$TEST_NAMESPACE"

      - name: "[Kubernetes] ConfigMap and Secret"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl create configmap conformance-config --from-literal=value=hello -n "$TEST_NAMESPACE"
          kubectl create secret generic conformance-secret --from-literal=password=test-value -n "$TEST_NAMESPACE"

          test "$(kubectl get configmap conformance-config -n "$TEST_NAMESPACE" -o jsonpath='{.data.value}')" = "hello"
          test "$(kubectl get secret conformance-secret -n "$TEST_NAMESPACE" -o jsonpath='{.data.password}' | base64 --decode)" = "test-value"

          kubectl patch configmap conformance-config -n "$TEST_NAMESPACE" --type merge -p '{"data":{"value":"updated"}}'
          test "$(kubectl get configmap conformance-config -n "$TEST_NAMESPACE" -o jsonpath='{.data.value}')" = "updated"

      - name: "[Kubernetes] Deploy Local Image"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cat > "$WORK_DIR/app.yaml" <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: conformance-app
            namespace: ${TEST_NAMESPACE}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: conformance-app
            template:
              metadata:
                labels:
                  app: conformance-app
              spec:
                containers:
                  - name: app
                    image: ${TEST_IMAGE}
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 8080
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: conformance-app
            namespace: ${TEST_NAMESPACE}
          spec:
            selector:
              app: conformance-app
            ports:
              - port: 80
                targetPort: 8080
          EOF

          kubectl apply -f "$WORK_DIR/app.yaml"

          kubectl rollout status deployment/conformance-app -n "$TEST_NAMESPACE" --timeout=180s
          kubectl get all -n "$TEST_NAMESPACE"

      - name: "[Kubernetes] Test kubectl logs"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          POD="$(kubectl get pods -n "$TEST_NAMESPACE" -l app=conformance-app -o jsonpath='{.items[0].metadata.name}')"
          kubectl logs "$POD" -n "$TEST_NAMESPACE"

      - name: "[Kubernetes] Test kubectl exec"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          POD="$(kubectl get pods -n "$TEST_NAMESPACE" -l app=conformance-app -o jsonpath='{.items[0].metadata.name}')"
          RESULT="$(kubectl exec "$POD" -n "$TEST_NAMESPACE" -- sh -c 'echo exec-ok')"
          test "$RESULT" = "exec-ok"

      - name: "[Networking] DNS and Service Test"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl run network-client --image=busybox:latest --restart=Never -n "$TEST_NAMESPACE" --command -- sleep 300
          kubectl wait --for=condition=Ready pod/network-client -n "$TEST_NAMESPACE" --timeout=180s

          kubectl exec network-client -n "$TEST_NAMESPACE" -- nslookup kubernetes.default.svc.cluster.local

          RESPONSE="$(kubectl exec network-client -n "$TEST_NAMESPACE" -- wget -qO- http://conformance-app)"
          echo "$RESPONSE" | grep -q "runner-conformance-ok"

      - name: "[Networking] Port Forward Test"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          LOG="$WORK_DIR/port-forward.log"

          kubectl port-forward -n "$TEST_NAMESPACE" service/conformance-app 18080:80 >"$LOG" 2>&1 &
          PF_PID=$!

          cleanup() {
            kill "$PF_PID" >/dev/null 2>&1 || true
            wait "$PF_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          READY=false
          for i in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:18080 > "$WORK_DIR/response"; then
              READY=true
              break
            fi
            sleep 1
          done

          if [ "$READY" != "true" ]; then
            cat "$LOG" || true
            exit 1
          fi

          grep -q "runner-conformance-ok" "$WORK_DIR/response"

      - name: "[Kubernetes] Scale and Rollout"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl scale deployment/conformance-app --replicas=2 -n "$TEST_NAMESPACE"
          kubectl rollout status deployment/conformance-app -n "$TEST_NAMESPACE" --timeout=180s

          READY="$(kubectl get deployment conformance-app -n "$TEST_NAMESPACE" -o jsonpath='{.status.readyReplicas}')"
          test "$READY" = "2"

      - name: "[Kubernetes] Job Test"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl create job conformance-job --image=busybox:latest -n "$TEST_NAMESPACE" -- sh -c 'echo job-ok'
          kubectl wait --for=condition=Complete job/conformance-job -n "$TEST_NAMESPACE" --timeout=180s
          kubectl logs job/conformance-job -n "$TEST_NAMESPACE" | grep -q "job-ok"

      - name: "[Kubernetes] RBAC Test"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl create serviceaccount conformance-reader -n "$TEST_NAMESPACE"

          kubectl create role conformance-reader \
            --verb=get \
            --verb=list \
            --resource=pods \
            -n "$TEST_NAMESPACE"

          kubectl create rolebinding conformance-reader \
            --role=conformance-reader \
            --serviceaccount="$TEST_NAMESPACE:conformance-reader" \
            -n "$TEST_NAMESPACE"

          kubectl auth can-i get pods -n "$TEST_NAMESPACE" --as="system:serviceaccount:$TEST_NAMESPACE:conformance-reader" --quiet

          if kubectl auth can-i delete namespaces --as="system:serviceaccount:$TEST_NAMESPACE:conformance-reader" --quiet 2>/dev/null; then
            exit 1
          fi

      - name: "[Kubernetes] CRD Test"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cat > "$WORK_DIR/crd.yaml" <<'EOF'
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: widgets.conformance.example
          spec:
            group: conformance.example
            scope: Namespaced
            names:
              plural: widgets
              singular: widget
              kind: Widget
            versions:
              - name: v1
                served: true
                storage: true
                schema:
                  openAPIV3Schema:
                    type: object
                    properties:
                      spec:
                        type: object
                        properties:
                          message:
                            type: string
          EOF

          kubectl apply -f "$WORK_DIR/crd.yaml"
          kubectl wait --for=condition=Established crd/widgets.conformance.example --timeout=90s

          cat > "$WORK_DIR/widget.yaml" <<EOF
          apiVersion: conformance.example/v1
          kind: Widget
          metadata:
            name: test-widget
            namespace: ${TEST_NAMESPACE}
          spec:
            message: hello
          EOF

          kubectl apply -f "$WORK_DIR/widget.yaml"
          test "$(kubectl get widget test-widget -n "$TEST_NAMESPACE" -o jsonpath='{.spec.message}')" = "hello"

          kubectl patch widget test-widget -n "$TEST_NAMESPACE" --type merge -p '{"spec":{"message":"updated"}}'
          test "$(kubectl get widget test-widget -n "$TEST_NAMESPACE" -o jsonpath='{.spec.message}')" = "updated"

          kubectl delete widget test-widget -n "$TEST_NAMESPACE"

      - name: "[Storage] Volume Mount Test"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cat > "$WORK_DIR/storage.yaml" <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: storage-test
            namespace: ${TEST_NAMESPACE}
          spec:
            restartPolicy: Never
            containers:
              - name: storage-test
                image: busybox:latest
                command:
                  - sh
                  - -c
                  - |
                    echo storage-ok > /data/result
                    cat /data/result
                volumeMounts:
                  - name: data
                    mountPath: /data
            volumes:
              - name: data
                emptyDir: {}
          EOF

          kubectl apply -f "$WORK_DIR/storage.yaml"
          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/storage-test -n "$TEST_NAMESPACE" --timeout=180s
          kubectl logs storage-test -n "$TEST_NAMESPACE" | grep -q "storage-ok"

      - name: "[Helm] CLI Presence Verification"
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if command -v helm >/dev/null 2>&1; then
            helm version --short
            echo "HELM_CLI_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "HELM_CLI_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "::warning::Helm CLI is unavailable on this runner."
          fi

      - name: "[Helm] Chart Lifecycle Test"
        if: env.KUBE_SUITE_ENABLED == 'true' && env.HELM_CLI_AVAILABLE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          CHART="$WORK_DIR/conformance-chart"

          helm create "$CHART"
          helm lint "$CHART"
          helm template conformance-chart "$CHART" --namespace "$TEST_NAMESPACE" > "$WORK_DIR/helm-rendered.yaml"

          helm install conformance-chart "$CHART" --namespace "$TEST_NAMESPACE" --set image.repository=nginx --set image.tag=alpine --wait --timeout 4m
          helm status conformance-chart --namespace "$TEST_NAMESPACE"

          helm upgrade conformance-chart "$CHART" --namespace "$TEST_NAMESPACE" --set replicaCount=2 --set image.repository=nginx --set image.tag=alpine --wait --timeout 4m
          helm uninstall conformance-chart --namespace "$TEST_NAMESPACE"

      - name: "[Conformance] Mark Kubernetes Suite Success"
        if: env.KUBE_SUITE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "K8S_SUITE_PASSED=true" >> "$GITHUB_ENV"

      - name: "[Report] Final Classification"
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          FINAL="$CLASSIFICATION"
          REASON="$CLASSIFICATION_REASON"

          if [ "$K8S_SUITE_PASSED" = "true" ] && [ "$STRATEGY" = "kind-standard" ]; then
            FINAL="FULL_CONFORMANCE_STANDARD"
            REASON="Official upstream kind node image path passed complete Kubernetes conformance suite."
          elif [ "$K8S_SUITE_PASSED" = "true" ] && [ "$STRATEGY" = "kind-custom-native-build" ]; then
            FINAL="FULL_CONFORMANCE_CUSTOM_KIND"
            REASON="Native ppc64le kind node image built from official kind/Kubernetes sources and passed complete suite."
          elif [ "$KUBE_SUITE_ENABLED" != "true" ] && [ "$FINAL" = "RUNNER_CONFIGURATION_FAILURE" ] && [ "$UPSTREAM_BLOCKER" != "none" ]; then
            FINAL="PARTIAL_CONFORMANCE_UPSTREAM_LIMITATION"
            REASON="$UPSTREAM_BLOCKER"
          elif [ "$KUBE_SUITE_ENABLED" = "true" ] && [ "$K8S_SUITE_PASSED" != "true" ] && [ "$FINAL" = "RUNNER_CONFIGURATION_FAILURE" ]; then
            FINAL="KUBERNETES_BOOTSTRAP_FAILURE"
            REASON="Cluster created but one or more Kubernetes conformance operations failed."
          fi

          echo "CLASSIFICATION=$FINAL" >> "$GITHUB_ENV"
          echo "CLASSIFICATION_REASON=$REASON" >> "$GITHUB_ENV"

          {
            echo "# Kubernetes CI Runner Conformance"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Runner | \`${{ matrix.runner }}\` |"
            echo "| Architecture | \`${CONFORMANCE_ARCH}\` |"
            echo "| Test ID | \`${TEST_ID}\` |"
            echo "| kind version | \`$(kind version 2>/dev/null || echo unavailable)\` |"
            echo "| kubectl version | \`$(kubectl version --client --short 2>/dev/null || echo unavailable)\` |"
            echo "| Helm CLI available | \`${HELM_CLI_AVAILABLE}\` |"
            echo "| Cluster strategy | \`${STRATEGY}\` |"
            echo "| Node image used | \`${KIND_NODE_IMAGE_USED}\` |"
            echo "| Cluster created | \`${CLUSTER_CREATED}\` |"
            echo "| Kubernetes suite executed | \`${KUBE_SUITE_ENABLED}\` |"
            echo "| Kubernetes suite passed | \`${K8S_SUITE_PASSED}\` |"
            echo "| Classification | \`${FINAL}\` |"
            echo ""
            echo "## Classification Details"
            echo "${REASON}"
            echo ""
            if [ "$UPSTREAM_BLOCKER" != "none" ]; then
              echo "### Upstream Blocker"
              echo "${UPSTREAM_BLOCKER}"
              echo ""
            fi
            echo "## Interpretation"
            echo "- FULL_CONFORMANCE_STANDARD: full suite passed with official kindest/node path."
            echo "- FULL_CONFORMANCE_CUSTOM_KIND: full suite passed with native custom-built kind node image from official sources/artifacts."
            echo "- PARTIAL_CONFORMANCE_UPSTREAM_LIMITATION: host/container conformance passed, but upstream architecture dependency blocked full Kubernetes conformance."
            echo "- RUNNER_CONFIGURATION_FAILURE: runner failed a required host/container capability prerequisite."
            echo "- KUBERNETES_BOOTSTRAP_FAILURE: host/container passed, but Kubernetes build/bootstrap/workload conformance failed without proven upstream blocker."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "[Diagnostics] Collect State"
        if: always()
        shell: bash
        run: |
          set +e

          echo "=== uname -a ==="
          uname -a

          echo ""
          echo "=== uname -m ==="
          uname -m

          echo ""
          echo "=== go version ==="
          go version || true

          echo ""
          echo "=== docker version ==="
          docker version || true

          echo ""
          echo "=== docker info ==="
          docker info || true

          echo ""
          echo "=== docker ps -a ==="
          docker ps -a || true

          echo ""
          echo "=== docker images ==="
          docker images || true

          echo ""
          echo "=== docker network ls ==="
          docker network ls || true

          echo ""
          echo "=== kind version ==="
          kind version || true

          echo ""
          echo "=== helm version ==="
          helm version --short || true

          echo ""
          echo "=== kubectl version ==="
          kubectl version --client --short || true

          echo ""
          echo "=== disk usage ==="
          df -h || true

          echo ""
          echo "=== memory usage ==="
          free -h || true

          if command -v kind >/dev/null 2>&1; then
            mkdir -p "$LOG_DIR/kind-export"
            kind export logs "$LOG_DIR/kind-export" --name "$CLUSTER_NAME" || true
          fi

          if command -v kubectl >/dev/null 2>&1 && kubectl cluster-info >/dev/null 2>&1; then
            echo ""
            echo "=== kubectl cluster-info ==="
            kubectl cluster-info || true

            echo ""
            echo "=== kubectl get nodes -o wide ==="
            kubectl get nodes -o wide || true

            echo ""
            echo "=== kubectl get pods -A -o wide ==="
            kubectl get pods -A -o wide || true

            echo ""
            echo "=== kubectl get events -A ==="
            kubectl get events -A --sort-by='.lastTimestamp' || true
          else
            echo "Kubernetes API not reachable for kubectl diagnostics."
          fi

          for c in $(docker ps -a --format '{{.Names}}' | grep "^${CLUSTER_NAME}-" || true); do
            echo ""
            echo "=== logs for ${c} ==="
            docker logs "$c" || true
          done

          echo ""
          echo "=== node-image build logs ==="
          cat "$LOG_DIR/kind-node-build.log" || true

          echo ""
          echo "=== kind create logs ==="
          cat "$LOG_DIR/kind-create.log" || true

      - name: "[Cleanup] Delete Kubernetes Cluster"
        if: always()
        shell: bash
        run: |
          set +e

          if command -v kind >/dev/null 2>&1; then
            kind delete cluster --name "$CLUSTER_NAME"
          fi

          docker ps -a --format '{{.ID}} {{.Names}}' | awk '$2 ~ /^'"${CLUSTER_NAME}"'-/ {print $1}' | xargs -r docker rm -f

      - name: "[Cleanup] Remove Container and Temp Resources"
        if: always()
        shell: bash
        run: |
          set +e

          docker image rm "$TEST_IMAGE" 2>/dev/null || true

          if [ -n "${KIND_NODE_IMAGE_USED:-}" ] && [ "$KIND_NODE_IMAGE_USED" != "none" ]; then
            docker image rm "$KIND_NODE_IMAGE_USED" 2>/dev/null || true
          fi

          docker network rm "conformance-net-$TEST_ID" 2>/dev/null || true
          docker volume rm "conformance-volume-$TEST_ID" 2>/dev/null || true

          rm -f "$KUBECONFIG" 2>/dev/null || true

          if [ -n "${WORK_DIR:-}" ] && [ -d "$WORK_DIR" ]; then
            rm -rf "$WORK_DIR"
          fi

      - name: "[Gate] Fail Non-Conformant Classifications"
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          echo "Final classification: ${CLASSIFICATION}"
          echo "Reason: ${CLASSIFICATION_REASON}"

          case "$CLASSIFICATION" in
            FULL_CONFORMANCE_STANDARD|FULL_CONFORMANCE_CUSTOM_KIND)
              echo "Conformance gate: PASS"
              ;;
            *)
              echo "::error::Conformance gate failed with classification ${CLASSIFICATION}"
              exit 1
              ;;
          esac
