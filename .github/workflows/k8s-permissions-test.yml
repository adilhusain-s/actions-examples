name: Kubernetes CI Runner Conformance

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TEST_NAMESPACE: runner-conformance
  KIND_CLUSTER_PREFIX: runner-conformance
  TEST_IMAGE_PREFIX: runner-conformance-app

jobs:
  runner-conformance:
    name: Conformance - ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04
          - ubuntu-24.04-ppc64le-vm

    timeout-minutes: 30

    steps:
      # ============================================================
      # 1. Create unique per-job environment
      # ============================================================

      - name: "[Setup] Create Unique Test Environment"
        id: unique
        shell: bash
        run: |
          set -euo pipefail

          RAW_ARCH="$(uname -m)"

          case "$RAW_ARCH" in
            x86_64)
              ARCH="amd64"
              ;;
            aarch64|arm64)
              ARCH="arm64"
              ;;
            ppc64le)
              ARCH="ppc64le"
              ;;
            s390x)
              ARCH="s390x"
              ;;
            *)
              ARCH="$RAW_ARCH"
              ;;
          esac

          # Unique to this workflow run + matrix job.
          TEST_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ strategy.job-index }}"
          CLUSTER_NAME="${KIND_CLUSTER_PREFIX}-${TEST_ID}"
          TEST_IMAGE="${TEST_IMAGE_PREFIX}:${TEST_ID}"
          WORK_DIR="$(mktemp -d -t runner-conformance.XXXXXXXX)"

          chmod 700 "$WORK_DIR"

          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
          echo "raw_arch=$RAW_ARCH" >> "$GITHUB_OUTPUT"
          echo "test_id=$TEST_ID" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "test_image=$TEST_IMAGE" >> "$GITHUB_OUTPUT"
          echo "work_dir=$WORK_DIR" >> "$GITHUB_OUTPUT"

          echo "TEST_ID=$TEST_ID" >> "$GITHUB_ENV"
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> "$GITHUB_ENV"
          echo "TEST_IMAGE=$TEST_IMAGE" >> "$GITHUB_ENV"
          echo "WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"
          echo "RUNNER_ARCH=$ARCH" >> "$GITHUB_ENV"

          echo "Test ID:       $TEST_ID"
          echo "Runner arch:   $ARCH"
          echo "Cluster name:  $CLUSTER_NAME"
          echo "Test image:    $TEST_IMAGE"
          echo "Work dir:      $WORK_DIR"

      # ============================================================
      # 2. Host diagnostics
      # ============================================================

      - name: "[Host] System Information"
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Identity ==="
          id

          echo ""
          echo "=== Hostname ==="
          hostname

          echo ""
          echo "=== Kernel ==="
          uname -a

          echo ""
          echo "=== Architecture ==="
          uname -m

          echo ""
          echo "=== OS ==="
          cat /etc/os-release || true

          echo ""
          echo "=== CPU ==="
          nproc
          lscpu || true

          echo ""
          echo "=== Memory ==="
          free -h || true

          echo ""
          echo "=== Disk ==="
          df -h

          echo ""
          echo "=== Cgroups ==="
          mount | grep cgroup || true

          if [ -f /sys/fs/cgroup/cgroup.controllers ]; then
            echo "cgroup v2 detected"
            cat /sys/fs/cgroup/cgroup.controllers
          else
            echo "cgroup v1 or hybrid detected"
          fi

      # ============================================================
      # 3. Filesystem capabilities
      # ============================================================

      - name: "[Host] Filesystem Test"
        shell: bash
        run: |
          set -euo pipefail

          TEST_DIR="$WORK_DIR/filesystem"
          mkdir -p "$TEST_DIR"

          echo "hello" > "$TEST_DIR/file"

          test "$(cat "$TEST_DIR/file")" = "hello"

          ln -s "$TEST_DIR/file" "$TEST_DIR/symlink"
          test -L "$TEST_DIR/symlink"

          chmod 600 "$TEST_DIR/file"

          cp "$TEST_DIR/file" "$TEST_DIR/copy"
          mv "$TEST_DIR/copy" "$TEST_DIR/moved"

          rm -rf "$TEST_DIR"

          echo "Filesystem test: PASS"

      # ============================================================
      # 4. Network and DNS
      # ============================================================

      - name: "[Host] Network and DNS Test"
        shell: bash
        run: |
          set -euo pipefail

          echo "=== DNS ==="
          getent hosts github.com
          getent hosts registry-1.docker.io || true
          getent hosts dl.k8s.io

          echo ""
          echo "=== HTTPS ==="

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --connect-timeout 15 \
            --output /dev/null \
            https://github.com

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --connect-timeout 15 \
            --output /dev/null \
            https://dl.k8s.io

          echo "Network test: PASS"

      # ============================================================
      # 5. Docker availability
      # ============================================================

      - name: "[Container] Validate Docker"
        shell: bash
        run: |
          set -euo pipefail

          command -v docker

          docker version
          docker info

          echo ""
          echo "Docker validation: PASS"

      # ============================================================
      # 6. Standard container lifecycle
      # ============================================================

      - name: "[Container] Pull and Run Container"
        shell: bash
        run: |
          set -euo pipefail

          docker run \
            --rm \
            busybox:latest \
            sh -c '
              echo "container architecture: $(uname -m)"
              echo "container execution: PASS"
            '

      # ============================================================
      # 7. Docker networking
      # ============================================================

      - name: "[Container] Docker Network Test"
        shell: bash
        run: |
          set -euo pipefail

          NETWORK="conformance-net-$TEST_ID"

          cleanup() {
            docker network rm "$NETWORK" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          docker network create "$NETWORK"
          docker network inspect "$NETWORK" >/dev/null

          echo "Docker network test: PASS"

      # ============================================================
      # 8. Docker volume
      # ============================================================

      - name: "[Container] Docker Volume Test"
        shell: bash
        run: |
          set -euo pipefail

          VOLUME="conformance-volume-$TEST_ID"

          cleanup() {
            docker volume rm "$VOLUME" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          docker volume create "$VOLUME"

          docker run \
            --rm \
            -v "$VOLUME:/data" \
            busybox:latest \
            sh -c 'echo conformance > /data/test'

          RESULT="$(
            docker run \
              --rm \
              -v "$VOLUME:/data" \
              busybox:latest \
              cat /data/test
          )"

          test "$RESULT" = "conformance"

          echo "Docker volume test: PASS"

      # ============================================================
      # 9. Privileged container capability
      #
      # Important for nested/containerized infrastructure patterns.
      # ============================================================

      - name: "[Container] Privileged Container Test"
        id: privileged
        shell: bash
        run: |
          set -euo pipefail

          docker run \
            --rm \
            --privileged \
            busybox:latest \
            sh -c '
              test -d /sys
              test -d /proc
              echo "privileged container: PASS"
            '

      # ============================================================
      # 10. Build a local image
      # ============================================================

      - name: "[Container] Build Local Test Image"
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="$WORK_DIR/app"
          mkdir -p "$APP_DIR"

          cat > "$APP_DIR/Dockerfile" <<'EOF'
          FROM busybox:latest

          RUN mkdir -p /www

          RUN printf '%s\n' \
            '<html>' \
            '<body>' \
            'runner-conformance-ok' \
            '</body>' \
            '</html>' \
            > /www/index.html

          EXPOSE 8080

          CMD ["httpd", "-f", "-p", "8080", "-h", "/www"]
          EOF

          docker build \
            --tag "$TEST_IMAGE" \
            "$APP_DIR"

          docker image inspect "$TEST_IMAGE" >/dev/null

          echo "Local image build: PASS"

      # ============================================================
      # 11. Install kubectl
      # ============================================================

      - name: "[Tools] Install kubectl"
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(
            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              https://dl.k8s.io/release/stable.txt
          )"

          URL="https://dl.k8s.io/release/${VERSION}/bin/linux/${RUNNER_ARCH}/kubectl"

          echo "Downloading: $URL"

          curl \
            --fail \
            --show-error \
            --location \
            --retry 5 \
            --retry-delay 3 \
            --output "$WORK_DIR/kubectl" \
            "$URL"

          chmod +x "$WORK_DIR/kubectl"

          mkdir -p "$HOME/.local/bin"
          cp "$WORK_DIR/kubectl" "$HOME/.local/bin/kubectl"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          "$HOME/.local/bin/kubectl" version --client

      # ============================================================
      # 12. Install Helm
      #
      # Build from source when a release artifact is unavailable.
      # This also validates Go-based OSS tooling on the runner.
      # ============================================================

      - name: "[Tools] Install Helm"
        shell: bash
        run: |
          set -euo pipefail

          if command -v helm >/dev/null 2>&1; then
            helm version
            exit 0
          fi

          if command -v go >/dev/null 2>&1; then
            echo "Installing Helm using Go..."

            GOBIN="$HOME/.local/bin" \
              go install helm.sh/helm/v3/cmd/helm@latest

            "$HOME/.local/bin/helm" version
          else
            echo "::error::Helm is not installed and Go is unavailable."
            exit 1
          fi

      # ============================================================
      # 13. Determine ephemeral cluster support
      #
      # kind is the primary representative OSS CI pattern.
      #
      # We deliberately do not pretend that an unsupported upstream
      # architecture is a runner permission failure.
      # ============================================================

      - name: "[Cluster] Select Cluster Strategy"
        id: cluster_strategy
        shell: bash
        run: |
          set -euo pipefail

          case "$RUNNER_ARCH" in
            amd64|arm64)
              echo "strategy=kind" >> "$GITHUB_OUTPUT"
              echo "supported=true" >> "$GITHUB_OUTPUT"

              echo "Using standard kind CI pattern."
              ;;

            ppc64le)
              echo "strategy=unsupported-upstream-kind-node-image" >> "$GITHUB_OUTPUT"
              echo "supported=false" >> "$GITHUB_OUTPUT"

              echo "::warning::Official kind node-image support cannot be assumed for ppc64le."
              echo "::warning::Host and container-runtime conformance tests will still run."
              ;;

            *)
              echo "strategy=unsupported-architecture" >> "$GITHUB_OUTPUT"
              echo "supported=false" >> "$GITHUB_OUTPUT"

              echo "::warning::No validated ephemeral cluster strategy for $RUNNER_ARCH."
              ;;
          esac

      # ============================================================
      # 14. Install kind
      # ============================================================

      - name: "[Cluster] Install kind"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if command -v go >/dev/null 2>&1; then
            echo "Installing kind from source..."

            GOBIN="$HOME/.local/bin" \
              go install sigs.k8s.io/kind@latest

            "$HOME/.local/bin/kind" version
          else
            echo "::error::Go is required to install kind in this conformance workflow."
            exit 1
          fi

      # ============================================================
      # 15. Create a unique ephemeral Kubernetes cluster
      # ============================================================

      - name: "[Cluster] Create Ephemeral Kubernetes Cluster"
        id: cluster
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          KIND_CONFIG="$WORK_DIR/kind-config.yaml"

          cat > "$KIND_CONFIG" <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
          EOF

          kind create cluster \
            --name "$CLUSTER_NAME" \
            --config "$KIND_CONFIG" \
            --wait 180s

          echo "Cluster creation: PASS"

      # ============================================================
      # 16. Validate cluster health
      # ============================================================

      - name: "[Cluster] Validate Cluster Health"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl cluster-info

          echo ""
          echo "=== Nodes ==="

          kubectl get nodes -o wide

          kubectl wait \
            --for=condition=Ready \
            node \
            --all \
            --timeout=120s

          echo ""
          echo "=== System Pods ==="

          kubectl get pods \
            --all-namespaces \
            -o wide

          echo ""
          echo "=== Node Architecture ==="

          kubectl get nodes \
            -o custom-columns='NAME:.metadata.name,ARCH:.status.nodeInfo.architecture,OS:.status.nodeInfo.operatingSystem,RUNTIME:.status.nodeInfo.containerRuntimeVersion'

          echo ""
          echo "Cluster health: PASS"

      # ============================================================
      # 17. Load locally built image into cluster
      # ============================================================

      - name: "[Cluster] Load Local Image"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kind load docker-image \
            "$TEST_IMAGE" \
            --name "$CLUSTER_NAME"

          echo "Local image import: PASS"

      # ============================================================
      # 18. Create isolated namespace
      # ============================================================

      - name: "[Kubernetes] Create Namespace"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl create namespace "$TEST_NAMESPACE"

          kubectl get namespace "$TEST_NAMESPACE"

      # ============================================================
      # 19. ConfigMap and Secret lifecycle
      # ============================================================

      - name: "[Kubernetes] ConfigMap and Secret"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl create configmap conformance-config \
            --from-literal=value=hello \
            -n "$TEST_NAMESPACE"

          kubectl create secret generic conformance-secret \
            --from-literal=password=test-value \
            -n "$TEST_NAMESPACE"

          test "$(
            kubectl get configmap conformance-config \
              -n "$TEST_NAMESPACE" \
              -o jsonpath='{.data.value}'
          )" = "hello"

          test "$(
            kubectl get secret conformance-secret \
              -n "$TEST_NAMESPACE" \
              -o jsonpath='{.data.password}' \
              | base64 --decode
          )" = "test-value"

          kubectl patch configmap conformance-config \
            -n "$TEST_NAMESPACE" \
            --type merge \
            -p '{"data":{"value":"updated"}}'

          test "$(
            kubectl get configmap conformance-config \
              -n "$TEST_NAMESPACE" \
              -o jsonpath='{.data.value}'
          )" = "updated"

          echo "ConfigMap and Secret lifecycle: PASS"

      # ============================================================
      # 20. Deploy locally built application
      # ============================================================

      - name: "[Kubernetes] Deploy Local Image"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cat > "$WORK_DIR/app.yaml" <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: conformance-app
            namespace: ${TEST_NAMESPACE}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: conformance-app
            template:
              metadata:
                labels:
                  app: conformance-app
              spec:
                containers:
                  - name: app
                    image: ${TEST_IMAGE}
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 8080
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: conformance-app
            namespace: ${TEST_NAMESPACE}
          spec:
            selector:
              app: conformance-app
            ports:
              - port: 80
                targetPort: 8080
          EOF

          kubectl apply -f "$WORK_DIR/app.yaml"

          kubectl rollout status \
            deployment/conformance-app \
            -n "$TEST_NAMESPACE" \
            --timeout=120s

          kubectl get all \
            -n "$TEST_NAMESPACE"

          echo "Build -> load -> deploy: PASS"

      # ============================================================
      # 21. kubectl logs
      # ============================================================

      - name: "[Kubernetes] Test kubectl logs"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          POD="$(
            kubectl get pods \
              -n "$TEST_NAMESPACE" \
              -l app=conformance-app \
              -o jsonpath='{.items[0].metadata.name}'
          )"

          kubectl logs \
            "$POD" \
            -n "$TEST_NAMESPACE"

          echo "kubectl logs: PASS"

      # ============================================================
      # 22. kubectl exec
      # ============================================================

      - name: "[Kubernetes] Test kubectl exec"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          POD="$(
            kubectl get pods \
              -n "$TEST_NAMESPACE" \
              -l app=conformance-app \
              -o jsonpath='{.items[0].metadata.name}'
          )"

          RESULT="$(
            kubectl exec \
              "$POD" \
              -n "$TEST_NAMESPACE" \
              -- sh -c 'echo exec-ok'
          )"

          test "$RESULT" = "exec-ok"

          echo "kubectl exec: PASS"

      # ============================================================
      # 23. In-cluster DNS and Service networking
      # ============================================================

      - name: "[Networking] DNS and Service Test"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl run network-client \
            --image=busybox:latest \
            --restart=Never \
            -n "$TEST_NAMESPACE" \
            --command \
            -- sleep 300

          kubectl wait \
            --for=condition=Ready \
            pod/network-client \
            -n "$TEST_NAMESPACE" \
            --timeout=120s

          echo "=== DNS Test ==="

          kubectl exec \
            network-client \
            -n "$TEST_NAMESPACE" \
            -- nslookup kubernetes.default.svc.cluster.local

          echo ""
          echo "=== Service Test ==="

          RESPONSE="$(
            kubectl exec \
              network-client \
              -n "$TEST_NAMESPACE" \
              -- wget \
                -qO- \
                http://conformance-app
          )"

          echo "$RESPONSE"

          echo "$RESPONSE" | grep -q "runner-conformance-ok"

          echo "Cluster DNS: PASS"
          echo "Service networking: PASS"

      # ============================================================
      # 24. kubectl port-forward
      # ============================================================

      - name: "[Networking] Port Forward Test"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          LOG="$WORK_DIR/port-forward.log"

          kubectl port-forward \
            -n "$TEST_NAMESPACE" \
            service/conformance-app \
            18080:80 \
            >"$LOG" 2>&1 &

          PF_PID=$!

          cleanup() {
            kill "$PF_PID" >/dev/null 2>&1 || true
            wait "$PF_PID" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          READY=false

          for i in $(seq 1 30); do
            if curl \
              --fail \
              --silent \
              http://127.0.0.1:18080 \
              > "$WORK_DIR/response"; then

              READY=true
              break
            fi

            sleep 1
          done

          if [ "$READY" != "true" ]; then
            cat "$LOG" || true
            echo "::error::Port-forward did not become ready"
            exit 1
          fi

          grep -q \
            "runner-conformance-ok" \
            "$WORK_DIR/response"

          echo "kubectl port-forward: PASS"

      # ============================================================
      # 25. Deployment scale and rollout
      # ============================================================

      - name: "[Kubernetes] Scale and Rollout"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl scale deployment/conformance-app \
            --replicas=2 \
            -n "$TEST_NAMESPACE"

          kubectl rollout status \
            deployment/conformance-app \
            -n "$TEST_NAMESPACE" \
            --timeout=120s

          READY="$(
            kubectl get deployment conformance-app \
              -n "$TEST_NAMESPACE" \
              -o jsonpath='{.status.readyReplicas}'
          )"

          test "$READY" = "2"

          echo "Deployment scaling: PASS"

      # ============================================================
      # 26. Job lifecycle
      # ============================================================

      - name: "[Kubernetes] Job Test"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl create job conformance-job \
            --image=busybox:latest \
            -n "$TEST_NAMESPACE" \
            -- sh -c 'echo job-ok'

          kubectl wait \
            --for=condition=Complete \
            job/conformance-job \
            -n "$TEST_NAMESPACE" \
            --timeout=120s

          kubectl logs \
            job/conformance-job \
            -n "$TEST_NAMESPACE" \
            | grep -q "job-ok"

          echo "Kubernetes Job: PASS"

      # ============================================================
      # 27. RBAC lifecycle
      # ============================================================

      - name: "[Kubernetes] RBAC Test"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          kubectl create serviceaccount conformance-reader \
            -n "$TEST_NAMESPACE"

          kubectl create role conformance-reader \
            --verb=get \
            --verb=list \
            --resource=pods \
            -n "$TEST_NAMESPACE"

          kubectl create rolebinding conformance-reader \
            --role=conformance-reader \
            --serviceaccount="$TEST_NAMESPACE:conformance-reader" \
            -n "$TEST_NAMESPACE"

          kubectl auth can-i get pods \
            -n "$TEST_NAMESPACE" \
            --as="system:serviceaccount:$TEST_NAMESPACE:conformance-reader" \
            | grep -qx "yes"

          kubectl auth can-i delete namespaces \
            --as="system:serviceaccount:$TEST_NAMESPACE:conformance-reader" \
            | grep -qx "no"

          echo "ServiceAccount / Role / RoleBinding: PASS"

      # ============================================================
      # 28. CRD lifecycle
      # ============================================================

      - name: "[Kubernetes] CRD Test"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cat > "$WORK_DIR/crd.yaml" <<'EOF'
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: widgets.conformance.example
          spec:
            group: conformance.example
            scope: Namespaced
            names:
              plural: widgets
              singular: widget
              kind: Widget
            versions:
              - name: v1
                served: true
                storage: true
                schema:
                  openAPIV3Schema:
                    type: object
                    properties:
                      spec:
                        type: object
                        properties:
                          message:
                            type: string
          EOF

          kubectl apply -f "$WORK_DIR/crd.yaml"

          kubectl wait \
            --for=condition=Established \
            crd/widgets.conformance.example \
            --timeout=60s

          cat > "$WORK_DIR/widget.yaml" <<EOF
          apiVersion: conformance.example/v1
          kind: Widget
          metadata:
            name: test-widget
            namespace: ${TEST_NAMESPACE}
          spec:
            message: hello
          EOF

          kubectl apply -f "$WORK_DIR/widget.yaml"

          test "$(
            kubectl get widget test-widget \
              -n "$TEST_NAMESPACE" \
              -o jsonpath='{.spec.message}'
          )" = "hello"

          kubectl patch widget test-widget \
            -n "$TEST_NAMESPACE" \
            --type merge \
            -p '{"spec":{"message":"updated"}}'

          test "$(
            kubectl get widget test-widget \
              -n "$TEST_NAMESPACE" \
              -o jsonpath='{.spec.message}'
          )" = "updated"

          kubectl delete widget test-widget \
            -n "$TEST_NAMESPACE"

          echo "CRD lifecycle: PASS"

      # ============================================================
      # 29. Helm lifecycle
      # ============================================================

      - name: "[Helm] Chart Lifecycle Test"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          CHART="$WORK_DIR/conformance-chart"

          helm create "$CHART"

          helm lint "$CHART"

          helm template \
            conformance-chart \
            "$CHART" \
            --namespace "$TEST_NAMESPACE" \
            > "$WORK_DIR/helm-rendered.yaml"

          helm install \
            conformance-chart \
            "$CHART" \
            --namespace "$TEST_NAMESPACE" \
            --set image.repository=nginx \
            --set image.tag=alpine \
            --wait \
            --timeout 3m

          helm status \
            conformance-chart \
            --namespace "$TEST_NAMESPACE"

          helm upgrade \
            conformance-chart \
            "$CHART" \
            --namespace "$TEST_NAMESPACE" \
            --set replicaCount=2 \
            --set image.repository=nginx \
            --set image.tag=alpine \
            --wait \
            --timeout 3m

          helm uninstall \
            conformance-chart \
            --namespace "$TEST_NAMESPACE"

          echo "Helm lifecycle: PASS"

      # ============================================================
      # 30. Basic storage
      # ============================================================

      - name: "[Storage] Volume Mount Test"
        if: steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cat > "$WORK_DIR/storage.yaml" <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: storage-test
            namespace: ${TEST_NAMESPACE}
          spec:
            restartPolicy: Never
            containers:
              - name: storage-test
                image: busybox:latest
                command:
                  - sh
                  - -c
                  - |
                    echo storage-ok > /data/result
                    cat /data/result
                volumeMounts:
                  - name: data
                    mountPath: /data
            volumes:
              - name: data
                emptyDir: {}
          EOF

          kubectl apply -f "$WORK_DIR/storage.yaml"

          kubectl wait \
            --for=jsonpath='{.status.phase}'=Succeeded \
            pod/storage-test \
            -n "$TEST_NAMESPACE" \
            --timeout=120s

          kubectl logs storage-test \
            -n "$TEST_NAMESPACE" \
            | grep -q "storage-ok"

          echo "emptyDir storage: PASS"

      # ============================================================
      # 31. Summary
      # ============================================================

      - name: "[Report] Conformance Summary"
        if: always()
        shell: bash
        run: |
          {
            echo "# Kubernetes CI Runner Conformance"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Runner | \`${{ matrix.runner }}\` |"
            echo "| Architecture | \`${{ steps.unique.outputs.arch || 'unknown' }}\` |"
            echo "| Test ID | \`${{ steps.unique.outputs.test_id || 'unknown' }}\` |"
            echo "| Privileged containers | \`${{ steps.privileged.outcome }}\` |"
            echo "| Cluster strategy | \`${{ steps.cluster_strategy.outputs.strategy || 'not-evaluated' }}\` |"
            echo "| Ephemeral cluster | \`${{ steps.cluster.outcome || 'not-run' }}\` |"
            echo ""
            echo "## Interpretation"
            echo ""

            if [ "${{ steps.cluster_strategy.outputs.supported }}" = "true" ]; then
              echo "This runner was tested using the standard ephemeral Kubernetes-in-Docker CI pattern."
            else
              echo "The host and container-runtime tests ran, but the standard kind cluster test was not run because the selected architecture does not have a validated upstream node-image path in this workflow."
              echo ""
              echo "This should be classified as an upstream architecture/tooling limitation, not automatically as a runner permission failure."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ============================================================
      # 32. Diagnostics
      # ============================================================

      - name: "[Diagnostics] Collect State"
        if: always()
        shell: bash
        run: |
          set +e

          echo "=== Docker Info ==="
          docker info

          echo ""
          echo "=== Docker Containers ==="
          docker ps -a

          echo ""
          echo "=== Docker Networks ==="
          docker network ls

          if command -v kubectl >/dev/null 2>&1; then
            echo ""
            echo "=== Kubernetes Nodes ==="
            kubectl get nodes -o wide

            echo ""
            echo "=== Kubernetes Pods ==="
            kubectl get pods -A -o wide

            echo ""
            echo "=== Kubernetes Events ==="
            kubectl get events -A \
              --sort-by='.lastTimestamp'
          fi

      # ============================================================
      # 33. Destroy ephemeral cluster
      # ============================================================

      - name: "[Cleanup] Delete Kubernetes Cluster"
        if: always() && steps.cluster_strategy.outputs.supported == 'true'
        shell: bash
        run: |
          set +e

          if command -v kind >/dev/null 2>&1; then
            kind delete cluster \
              --name "$CLUSTER_NAME"
          fi

      # ============================================================
      # 34. Remove test image and leftovers
      # ============================================================

      - name: "[Cleanup] Remove Container Resources"
        if: always()
        shell: bash
        run: |
          set +e

          docker rm -f \
            $(docker ps -aq \
              --filter "name=$TEST_ID") \
            2>/dev/null || true

          docker image rm \
            "$TEST_IMAGE" \
            2>/dev/null || true

          docker network rm \
            "conformance-net-$TEST_ID" \
            2>/dev/null || true

          docker volume rm \
            "conformance-volume-$TEST_ID" \
            2>/dev/null || true

      # ============================================================
      # 35. Remove all temporary files
      # ============================================================

      - name: "[Cleanup] Remove Temporary Files"
        if: always()
        shell: bash
        run: |
          set +e

          if [ -n "${WORK_DIR:-}" ] && [ -d "$WORK_DIR" ]; then
            rm -rf "$WORK_DIR"
          fi

          echo "Temporary files removed."