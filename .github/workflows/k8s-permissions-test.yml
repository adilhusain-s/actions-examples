name: K8s Runner Access & Permissions Test

on:
  workflow_dispatch:
    inputs:
      kubeconfig:
        description: "Kubeconfig content, base64 encoded"
        required: true
        type: string

      namespace:
        description: "Kubernetes namespace to test"
        required: true
        default: "default"
        type: string

      test-image:
        description: "Container image for workload tests; must support the Kubernetes node architecture"
        required: true
        default: "registry.k8s.io/pause:3.10"
        type: string

env:
  KUBECONFIG: /tmp/kubeconfig
  TEST_IMAGE: ${{ inputs.test-image }}

jobs:
  k8s-permissions-test:
    name: K8s Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-ppc64le-vm
          - ubuntu-22.04

    timeout-minutes: 15

    steps:
      # ============================================================
      # 1. Runner diagnostics
      # ============================================================

      - name: "[Setup] Runner Information"
        id: runner
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Runner Information ==="
          echo "Runner label: ${{ matrix.os }}"
          echo "Hostname: $(hostname)"
          echo "OS:"
          cat /etc/os-release || true
          echo ""
          echo "Kernel:"
          uname -a
          echo ""
          echo "Architecture:"
          uname -m

      # ============================================================
      # 2. Detect runner architecture
      # ============================================================

      - name: "[Setup] Detect Architecture"
        id: arch
        shell: bash
        run: |
          set -euo pipefail

          RAW_ARCH="$(uname -m)"

          case "$RAW_ARCH" in
            x86_64)
              K8S_ARCH="amd64"
              ;;
            aarch64|arm64)
              K8S_ARCH="arm64"
              ;;
            ppc64le)
              K8S_ARCH="ppc64le"
              ;;
            s390x)
              K8S_ARCH="s390x"
              ;;
            *)
              echo "::error::Unsupported runner architecture: $RAW_ARCH"
              exit 1
              ;;
          esac

          echo "Raw runner architecture: $RAW_ARCH"
          echo "Kubernetes binary architecture: $K8S_ARCH"

          echo "raw_arch=$RAW_ARCH" >> "$GITHUB_OUTPUT"
          echo "k8s_arch=$K8S_ARCH" >> "$GITHUB_OUTPUT"

      # ============================================================
      # 3. Install kubectl
      # ============================================================

      - name: "[Setup] Install kubectl"
        shell: bash
        run: |
          set -euo pipefail

          K8S_ARCH="${{ steps.arch.outputs.k8s_arch }}"

          echo "Getting latest stable Kubernetes version..."

          KUBECTL_VERSION="$(
            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 5 \
              --retry-delay 3 \
              --connect-timeout 15 \
              https://dl.k8s.io/release/stable.txt
          )"

          if [ -z "$KUBECTL_VERSION" ]; then
            echo "::error::Could not determine the stable kubectl version"
            exit 1
          fi

          echo "kubectl version: $KUBECTL_VERSION"
          echo "kubectl architecture: linux/$K8S_ARCH"

          KUBECTL_URL="https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${K8S_ARCH}/kubectl"

          curl \
            --fail \
            --show-error \
            --location \
            --retry 5 \
            --retry-delay 3 \
            --connect-timeout 15 \
            --output kubectl \
            "$KUBECTL_URL"

          chmod +x kubectl

          # Avoid requiring sudo when possible.
          mkdir -p "$HOME/.local/bin"
          mv kubectl "$HOME/.local/bin/kubectl"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # GITHUB_PATH is applied to subsequent steps, so use the
          # full path for verification in this step.
          "$HOME/.local/bin/kubectl" version --client

      # ============================================================
      # 4. Create and validate kubeconfig
      # ============================================================

      - name: "[Setup] Create and Validate Kubeconfig"
        id: kubeconfig
        shell: bash
        env:
          KUBECONFIG_B64: ${{ inputs.kubeconfig }}
        run: |
          set -euo pipefail

          echo "Creating kubeconfig at: $KUBECONFIG"

          if ! printf '%s' "$KUBECONFIG_B64" | base64 --decode > "$KUBECONFIG"; then
            rm -f "$KUBECONFIG"
            echo "::error::Failed to decode the base64-encoded kubeconfig"
            exit 1
          fi

          unset KUBECONFIG_B64

          if [ ! -s "$KUBECONFIG" ]; then
            rm -f "$KUBECONFIG"
            echo "::error::Decoded kubeconfig is empty"
            exit 1
          fi

          chmod 600 "$KUBECONFIG"

          echo "Validating kubeconfig structure..."

          if ! kubectl config view >/dev/null; then
            echo "::error::The decoded file is not a valid kubeconfig"
            exit 1
          fi

          CURRENT_CONTEXT="$(kubectl config current-context 2>/dev/null || true)"

          if [ -z "$CURRENT_CONTEXT" ]; then
            echo "::error::The kubeconfig has no current context"
            exit 1
          fi

          echo "Current context: $CURRENT_CONTEXT"
          echo "Kubeconfig created and validated successfully."

          echo "current_context=$CURRENT_CONTEXT" >> "$GITHUB_OUTPUT"

      # ============================================================
      # 5. Test API connectivity
      #
      # Failure here is fatal. The purpose of this workflow is to
      # prove that this specific runner can reach the K8s API.
      # ============================================================

      - name: "[Connectivity] Test Kubernetes API"
        id: connectivity
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Kubernetes API Endpoint ==="

          API_SERVER="$(
            kubectl config view \
              --minify \
              -o jsonpath='{.clusters[0].cluster.server}'
          )"

          if [ -z "$API_SERVER" ]; then
            echo "::error::Could not determine the Kubernetes API server"
            exit 1
          fi

          echo "API server: $API_SERVER"
          echo "api_server=$API_SERVER" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Testing API Connectivity ==="

          if ! API_VERSION="$(
            kubectl \
              --request-timeout=20s \
              get --raw=/version
          )"; then
            echo "::error::The runner could not successfully reach the Kubernetes API"
            exit 1
          fi

          echo "$API_VERSION"
          echo ""
          echo "Kubernetes API connectivity: PASS"

      # ============================================================
      # 6. Test authentication and namespace access
      # ============================================================

      - name: "[Auth] Validate Authentication"
        id: auth
        shell: bash
        run: |
          set -euo pipefail

          NS="${{ inputs.namespace }}"

          echo "=== Authentication Test ==="

          # kubectl auth can-i is an authenticated API request.
          # A successful command proves the credentials were accepted,
          # even if the RBAC answer itself is "no".
          if ! AUTH_RESULT="$(
            kubectl \
              --request-timeout=20s \
              auth can-i get pods \
              -n "$NS" 2>&1
          )"; then
            echo "$AUTH_RESULT"
            echo "::error::Authentication or authorization API request failed"
            exit 1
          fi

          echo "Authentication request succeeded."
          echo "Can get pods in namespace '$NS': $AUTH_RESULT"

          echo ""
          echo "=== Current Context ==="
          kubectl config current-context

          echo ""
          echo "=== Configured User Name ==="
          CONFIGURED_USER="$(
            kubectl config view \
              --minify \
              -o jsonpath='{.contexts[0].context.user}' \
              2>/dev/null || true
          )"

          if [ -n "$CONFIGURED_USER" ]; then
            echo "$CONFIGURED_USER"
          else
            echo "User name is not explicitly available in kubeconfig."
          fi

          echo "configured_user=$CONFIGURED_USER" >> "$GITHUB_OUTPUT"

      # ============================================================
      # 7. Collect cluster information
      # ============================================================

      - name: "[Cluster] Collect Cluster Information"
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Kubernetes Version ==="
          kubectl version

          echo ""
          echo "=== Cluster Information ==="
          kubectl cluster-info

          echo ""
          echo "=== Kubernetes Nodes and Architectures ==="

          if kubectl auth can-i list nodes 2>/dev/null | grep -qx "yes"; then
            kubectl get nodes \
              -o custom-columns='NAME:.metadata.name,ARCH:.status.nodeInfo.architecture,OS:.status.nodeInfo.operatingSystem,KUBELET:.status.nodeInfo.kubeletVersion'

            echo ""
            echo "NOTE:"
            echo "Runner architecture and Kubernetes node architecture are independent."
            echo "Runner architecture determines which kubectl binary is required."
            echo "Node architecture determines which container images can run."
          else
            echo "RBAC does not allow listing Kubernetes nodes."
          fi

      # ============================================================
      # 8. Namespace-scoped read tests
      # ============================================================

      - name: "[Read] Namespace-Scoped Resources"
        shell: bash
        run: |
          set -u

          NS="${{ inputs.namespace }}"

          echo "=== Namespace: $NS ==="

          for resource in \
            pods \
            services \
            deployments \
            configmaps \
            secrets \
            events \
            ingresses \
            persistentvolumeclaims
          do
            echo ""
            echo "--- $resource ---"

            if kubectl get "$resource" -n "$NS"; then
              echo "RESULT: PASS - can list $resource"
            else
              echo "RESULT: DENIED/FAILED - cannot list $resource"
            fi
          done

      # ============================================================
      # 9. Cluster-scoped read tests
      # ============================================================

      - name: "[Read] Cluster-Scoped Resources"
        shell: bash
        run: |
          set -u

          for resource in \
            nodes \
            namespaces \
            storageclasses \
            persistentvolumes \
            clusterroles \
            clusterrolebindings \
            customresourcedefinitions
          do
            echo ""
            echo "--- $resource ---"

            if kubectl get "$resource" >/dev/null; then
              echo "RESULT: PASS - can list $resource"
            else
              echo "RESULT: DENIED/FAILED - cannot list $resource"
            fi
          done

      # ============================================================
      # 10. Fine-grained namespace RBAC checks
      # ============================================================

      - name: "[RBAC] Namespace-Scoped Permissions"
        shell: bash
        run: |
          set -u

          NS="${{ inputs.namespace }}"

          echo "=== Namespace-Scoped RBAC Checks ==="
          echo "Namespace: $NS"
          echo ""

          for resource in \
            pods \
            services \
            deployments \
            configmaps \
            secrets \
            events \
            ingresses \
            persistentvolumeclaims
          do
            for verb in \
              get \
              list \
              watch \
              create \
              update \
              patch \
              delete
            do
              if RESULT="$(
                kubectl auth can-i \
                  "$verb" \
                  "$resource" \
                  -n "$NS" \
                  2>&1
              )"; then
                echo "$verb $resource = $RESULT"
              else
                echo "$verb $resource = ERROR: $RESULT"
              fi
            done
          done

      # ============================================================
      # 11. Fine-grained cluster RBAC checks
      # ============================================================

      - name: "[RBAC] Cluster-Scoped Permissions"
        shell: bash
        run: |
          set -u

          echo "=== Cluster-Scoped RBAC Checks ==="

          for resource in \
            nodes \
            namespaces \
            storageclasses \
            persistentvolumes \
            clusterroles \
            clusterrolebindings
          do
            for verb in \
              get \
              list \
              watch \
              create \
              update \
              patch \
              delete
            do
              if RESULT="$(
                kubectl auth can-i \
                  "$verb" \
                  "$resource" \
                  2>&1
              )"; then
                echo "$verb $resource = $RESULT"
              else
                echo "$verb $resource = ERROR: $RESULT"
              fi
            done
          done

      # ============================================================
      # 12. Functional Pod API test
      #
      # This tests actual API create/get/delete access.
      # Pod readiness is reported separately because scheduling/runtime
      # behavior is not the same as RBAC permission.
      # ============================================================

      - name: "[Write] Test Pod Creation"
        id: pod_test
        shell: bash
        env:
          NS: ${{ inputs.namespace }}
          TEST_NAME: permission-test-${{ github.run_id }}-${{ strategy.job-index }}
        run: |
          set -u

          echo "Test resource: $TEST_NAME"
          echo "Test image: $TEST_IMAGE"

          CAN_CREATE="$(
            kubectl auth can-i create pods -n "$NS" 2>/dev/null || true
          )"

          if [ "$CAN_CREATE" != "yes" ]; then
            echo "SKIPPED: RBAC does not allow pod creation."
            echo "result=SKIPPED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "RBAC allows pod creation."

          if ! kubectl run "$TEST_NAME" \
            --image="$TEST_IMAGE" \
            --restart=Never \
            -n "$NS"; then

            echo "FAIL: RBAC allowed pod creation, but the API create operation failed."
            echo "result=CREATE_FAILED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PASS: Pod API creation succeeded."
          echo "result=CREATED" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Created Pod ==="
          kubectl get pod "$TEST_NAME" -n "$NS" -o wide || true

          echo ""
          echo "=== Scheduling / Readiness Test ==="

          if kubectl wait \
            --for=condition=Ready \
            "pod/$TEST_NAME" \
            -n "$NS" \
            --timeout=45s; then

            echo "PASS: Pod became Ready."
            echo "runtime_result=READY" >> "$GITHUB_OUTPUT"
          else
            echo "INFO: Pod did not become Ready within 45 seconds."
            echo "This does not invalidate the API/RBAC creation test."
            echo "runtime_result=NOT_READY" >> "$GITHUB_OUTPUT"

            echo ""
            echo "=== Pod Diagnostics ==="
            kubectl describe pod "$TEST_NAME" -n "$NS" || true
          fi

      # ============================================================
      # 13. Functional Deployment test
      # ============================================================

      - name: "[Write] Test Deployment Creation and Scaling"
        id: deployment_test
        shell: bash
        env:
          NS: ${{ inputs.namespace }}
          TEST_NAME: permission-deploy-${{ github.run_id }}-${{ strategy.job-index }}
        run: |
          set -u

          CAN_CREATE="$(
            kubectl auth can-i create deployments -n "$NS" 2>/dev/null || true
          )"

          if [ "$CAN_CREATE" != "yes" ]; then
            echo "SKIPPED: RBAC does not allow deployment creation."
            echo "result=SKIPPED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! kubectl create deployment "$TEST_NAME" \
            --image="$TEST_IMAGE" \
            -n "$NS"; then

            echo "FAIL: Deployment API creation failed."
            echo "result=CREATE_FAILED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PASS: Deployment created."
          echo "result=CREATED" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Deployment ==="
          kubectl get deployment "$TEST_NAME" -n "$NS" || true

          echo ""
          echo "=== Scale Test ==="

          if kubectl scale deployment "$TEST_NAME" \
            --replicas=2 \
            -n "$NS"; then

            echo "PASS: Deployment scaling succeeded."
            echo "scale_result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "FAIL: Deployment scaling failed."
            echo "scale_result=FAIL" >> "$GITHUB_OUTPUT"
          fi

          echo ""
          echo "=== Deployment Pods ==="
          kubectl get pods \
            -n "$NS" \
            -l "app=$TEST_NAME" \
            -o wide || true

      # ============================================================
      # 14. Functional Service test
      # ============================================================

      - name: "[Write] Test Service Creation"
        id: service_test
        shell: bash
        env:
          NS: ${{ inputs.namespace }}
          TEST_NAME: permission-svc-${{ github.run_id }}-${{ strategy.job-index }}
        run: |
          set -u

          CAN_CREATE="$(
            kubectl auth can-i create services -n "$NS" 2>/dev/null || true
          )"

          if [ "$CAN_CREATE" != "yes" ]; then
            echo "SKIPPED: RBAC does not allow service creation."
            echo "result=SKIPPED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if kubectl create service clusterip "$TEST_NAME" \
            --tcp=80:80 \
            -n "$NS"; then

            echo "PASS: Service creation succeeded."
            echo "result=CREATED" >> "$GITHUB_OUTPUT"
          else
            echo "FAIL: Service creation failed."
            echo "result=CREATE_FAILED" >> "$GITHUB_OUTPUT"
          fi

      # ============================================================
      # 15. GitHub Step Summary
      # ============================================================

      - name: "[Report] Write Test Summary"
        if: always()
        shell: bash
        env:
          NS: ${{ inputs.namespace }}
        run: |
          {
            echo "# Kubernetes Runner Access Test"
            echo ""
            echo "## Runner"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Runner | \`${{ matrix.os }}\` |"
            echo "| Runner architecture | \`${{ steps.arch.outputs.k8s_arch || 'unknown' }}\` |"
            echo "| Namespace | \`$NS\` |"
            echo "| Test image | \`$TEST_IMAGE\` |"
            echo ""

            echo "## Prerequisites"
            echo ""
            echo "| Test | Result |"
            echo "|---|---|"
            echo "| Kubeconfig | ${{ steps.kubeconfig.outcome }} |"
            echo "| API connectivity | ${{ steps.connectivity.outcome }} |"
            echo "| Authentication | ${{ steps.auth.outcome }} |"
            echo ""

            echo "## Functional Tests"
            echo ""
            echo "| Test | Result |"
            echo "|---|---|"
            echo "| Pod API test | ${{ steps.pod_test.outputs.result || 'not-run' }} |"
            echo "| Pod runtime | ${{ steps.pod_test.outputs.runtime_result || 'not-run' }} |"
            echo "| Deployment API test | ${{ steps.deployment_test.outputs.result || 'not-run' }} |"
            echo "| Deployment scaling | ${{ steps.deployment_test.outputs.scale_result || 'not-run' }} |"
            echo "| Service API test | ${{ steps.service_test.outputs.result || 'not-run' }} |"
            echo ""

            echo "## Architecture"
            echo ""
            echo "The runner architecture determines which \`kubectl\` binary is installed."
            echo "The Kubernetes node architecture determines which workload images can run."
            echo ""

            if [ "${{ steps.connectivity.outcome }}" = "success" ]; then
              echo "### Kubernetes Nodes"
              echo ""
              echo '```text'

              if kubectl auth can-i list nodes 2>/dev/null | grep -qx "yes"; then
                kubectl get nodes \
                  -o custom-columns='NAME:.metadata.name,ARCH:.status.nodeInfo.architecture,OS:.status.nodeInfo.operatingSystem,KUBELET:.status.nodeInfo.kubeletVersion' \
                  2>/dev/null || true
              else
                echo "Node listing is not permitted by RBAC."
              fi

              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ============================================================
      # 16. Always clean up test resources
      # ============================================================

      - name: "[Cleanup] Remove Test Resources"
        if: always() && steps.kubeconfig.outcome == 'success'
        shell: bash
        env:
          NS: ${{ inputs.namespace }}
          POD_NAME: permission-test-${{ github.run_id }}-${{ strategy.job-index }}
          DEPLOYMENT_NAME: permission-deploy-${{ github.run_id }}-${{ strategy.job-index }}
          SERVICE_NAME: permission-svc-${{ github.run_id }}-${{ strategy.job-index }}
        run: |
          set +e

          echo "=== Cleaning up test resources ==="

          kubectl delete pod "$POD_NAME" \
            -n "$NS" \
            --ignore-not-found \
            --wait=false

          kubectl delete deployment "$DEPLOYMENT_NAME" \
            -n "$NS" \
            --ignore-not-found \
            --wait=false

          kubectl delete service "$SERVICE_NAME" \
            -n "$NS" \
            --ignore-not-found

          echo "Cleanup attempt complete."

      # ============================================================
      # 17. Remove kubeconfig from runner
      # ============================================================

      - name: "[Cleanup] Remove Kubeconfig"
        if: always()
        shell: bash
        run: |
          rm -f "$KUBECONFIG"